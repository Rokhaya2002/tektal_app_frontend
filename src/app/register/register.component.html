<h2>Inscription</h2>

<form class="register-form" [formGroup]="registerForm" (ngSubmit)="register()">
  <input type="text" placeholder="Nom complet" formControlName="name" required>
  <input type="email" placeholder="Adresse e-mail" formControlName="email" required>
  <input type="password" placeholder="Mot de passe" formControlName="password" required>
  <input type="password" placeholder="Confirmez le mot de passe" formControlName="password_confirmation" required>
  <button type="submit">S'inscrire</button>

  <div class="login-text">
    Déjà un compte ?
    <a routerLink="/login" class="login-link">Se connecter</a>
  </div>
</form>
